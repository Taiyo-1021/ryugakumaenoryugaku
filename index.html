<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>英語発音記号ガイド</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ヘッダー -->
  <header class="site-header">
    <div class="header-top">
      <div class="logo">
        <span class="logo-icon">🔤</span>
        <span class="logo-text">英語発音ガイド</span>
      </div>
      <div class="progress-area">
        <span class="progress-label">マスター済み</span>
        <div class="progress-bar-wrap">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <span class="progress-count" id="progressCount">0 / 45</span>
      </div>
      <div class="mode-buttons">
        <button class="mode-btn active" id="btnGrid" onclick="setMode('grid')">📚 一覧</button>
        <button class="mode-btn" id="btnFlash" onclick="setMode('flash')">🃏 フラッシュカード</button>
        <button class="mode-btn" id="btnQuiz" onclick="setMode('quiz')">🎯 クイズ</button>
      </div>
    </div>

    <!-- フィルター・検索バー -->
    <div class="filter-bar" id="filterBar">
      <div class="filter-buttons">
        <button class="filter-btn active" data-cat="all">すべて</button>
        <button class="filter-btn" data-cat="short">短母音</button>
        <button class="filter-btn" data-cat="long">長母音</button>
        <button class="filter-btn" data-cat="diphthong">二重母音</button>
        <button class="filter-btn" data-cat="consonant-voiceless">子音（無声）</button>
        <button class="filter-btn" data-cat="consonant-voiced">子音（有声）</button>
        <button class="filter-btn" data-cat="nasal">鼻音・接近音</button>
        <button class="filter-btn" data-cat="mastered">✅ 習得済み</button>
      </div>
      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="記号・単語で検索..." autocomplete="off">
        <span class="search-icon">🔍</span>
      </div>
    </div>
  </header>

  <!-- メインコンテンツ -->
  <main class="main-content">

    <!-- 一覧モード -->
    <section id="gridMode" class="mode-section active">
      <div class="cards-grid" id="cardsGrid"></div>
      <div class="empty-state" id="emptyState" style="display:none">
        <span>🔍</span>
        <p>該当する発音記号が見つかりません</p>
      </div>
    </section>

    <!-- フラッシュカードモード -->
    <section id="flashMode" class="mode-section">
      <div class="flash-container">
        <div class="flash-nav">
          <button class="flash-nav-btn" id="flashPrev" onclick="flashNav(-1)">&#8592;</button>
          <span class="flash-counter" id="flashCounter">1 / 45</span>
          <button class="flash-nav-btn" id="flashNext" onclick="flashNav(1)">&#8594;</button>
        </div>
        <div class="flash-card-wrap" id="flashCardWrap">
          <div class="flash-card" id="flashCard" onclick="flipFlashCard()">
            <div class="flash-front" id="flashFront"></div>
            <div class="flash-back" id="flashBack"></div>
          </div>
        </div>
        <div class="flash-actions">
          <button class="action-btn secondary" onclick="shuffleFlash()">🔀 シャッフル</button>
          <button class="action-btn secondary" id="flashMasterBtn" onclick="toggleFlashMaster()">⭐ 習得済みにする</button>
          <button class="action-btn primary" onclick="flipFlashCard()">カードをめくる</button>
        </div>
        <p class="flash-hint">クリック・タップでめくる / ← → キーで移動</p>
      </div>
    </section>

    <!-- クイズモード -->
    <section id="quizMode" class="mode-section">
      <div class="quiz-container" id="quizContainer">
        <div class="quiz-header">
          <span class="quiz-score-label">スコア: <strong id="quizScore">0</strong></span>
          <span class="quiz-progress-label">問題 <strong id="quizCurrent">1</strong> / <strong id="quizTotal">10</strong></span>
        </div>
        <div id="quizQuestion"></div>
        <div class="quiz-options" id="quizOptions"></div>
        <div class="quiz-result" id="quizResult" style="display:none"></div>
      </div>
      <div class="quiz-end" id="quizEnd" style="display:none">
        <div class="quiz-end-card">
          <div class="quiz-end-icon" id="quizEndIcon"></div>
          <h2>クイズ終了！</h2>
          <p class="quiz-end-score" id="quizEndScore"></p>
          <button class="action-btn primary" onclick="startQuiz()">もう一度挑戦</button>
          <button class="action-btn secondary" onclick="setMode('grid')">一覧に戻る</button>
        </div>
      </div>
    </section>

  </main>

  <!-- カード詳細モーダル（一覧モード用） -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
    <div class="modal-card" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-content" id="modalContent"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
